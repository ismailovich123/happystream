<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Background Gradient: Deep dark purple to black -->
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="50%" fx="30%" fy="30%">
      <stop offset="0%" stop-color="#2a1454" />
      <stop offset="100%" stop-color="#0f071a" />
    </radialGradient>
    
    <!-- Accent Gradient: Golden Yellow to Neon Orange -->
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24" />
      <stop offset="50%" stop-color="#f59e0b" />
      <stop offset="100%" stop-color="#ea580c" />
    </linearGradient>
    
    <!-- Glow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Outer rounded square/circle background with gradient and border -->
  <rect x="16" y="16" width="480" height="480" rx="120" fill="url(#bgGrad)" stroke="url(#accentGrad)" stroke-width="16" />

  <!-- Inner stylized 'H' and 'S' or Streaming Play symbol -->
  <!-- A glowing play button merged with elegant lightning/signal waves representing high-speed streaming -->
  <g filter="url(#glow)">
    <!-- Inner Circle path -->
    <circle cx="256" cy="256" r="140" fill="none" stroke="#ffffff" stroke-width="8" opacity="0.15" />
    
    <!-- High-speed stream ring segment (glowing) -->
    <path d="M 150 256 A 106 106 0 1 1 362 256" fill="none" stroke="url(#accentGrad)" stroke-width="24" stroke-linecap="round" />
    <path d="M 362 256 A 106 106 0 0 1 150 256" fill="none" stroke="#ffffff" stroke-width="24" stroke-linecap="round" stroke-dasharray="10 30" opacity="0.8" />

    <!-- Play Button (Triangle with rounded corners) inside -->
    <path d="M 220 186 C 220 178 228 174 235 178 L 324 238 C 330 242 330 250 324 254 L 235 314 C 228 318 220 314 220 306 Z" fill="url(#accentGrad)" />
  </g>

  <!-- Happy Face smile representation in the stream waves / speed lines -->
  <path d="M 190 350 Q 256 400 322 350" fill="none" stroke="url(#accentGrad)" stroke-width="20" stroke-linecap="round" />
</svg>
